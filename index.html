<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Learning App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vocabulary Learning App</h1>
        <p>Manage your vocabulary effectively!</p>
    </header>
    <main>
        <section id="word-management">
            <h2>Vocabulary Words</h2>
            <input type="text" id="search" placeholder="Search words...">
            <ul id="word-list"></ul>
            <form id="word-form">
                <input type="text" id="word" placeholder="Word" required>
                <input type="text" id="definition" placeholder="Definition" required>
                <input type="text" id="example" placeholder="Example sentence" required>
                <input type="text" id="category" placeholder="Category">
                <input type="text" id="difficulty" placeholder="Difficulty level">
                <button type="submit">Add Word</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Vocabulary Learning App</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
